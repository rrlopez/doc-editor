services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  db-init:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - ./docker/postgres/ensure-database.sh:/ensure-database.sh:ro
    entrypoint: ['/bin/sh', '/ensure-database.sh']
    depends_on:
      db:
        condition: service_healthy
    restart: 'no'

  app-fe:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    container_name: app-fe
    depends_on:
      db-init:
        condition: service_completed_successfully
    ports:
      - '${PUBLIC_PORT:-3100}:${PORT:-3000}'
      - '51212:51212'
    env_file:
      - .env
    shm_size: '1gb'
    volumes:
      - app_output:/app/.output
      - ./.env:/app/.env:ro
    command: ['pnpm', 'run', 'dev:docker']
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .output/
            - .git/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml

volumes:
  postgres_data:
  app_output:
